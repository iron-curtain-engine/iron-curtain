# Iron Curtain — default configuration
#
# This file contains the built-in defaults and documents every setting.
# Do NOT put machine-specific paths here — this file is checked into git.
#
# To override values, copy this file to `iron-curtain.toml` (same directory)
# and edit to taste. The game loads `iron-curtain.toml` first; if absent,
# it falls back to this file.

# ─── Display ────────────────────────────────────────────────────────────────

[display]
# Window title shown in the title bar / taskbar.
title = "Iron Curtain - Content Lab"

# Window mode: "borderless-fullscreen", "windowed", "fullscreen".
mode = "borderless-fullscreen"

# Fallback resolution used before the window system applies fullscreen.
# Only matters in "windowed" mode or if the fullscreen switch is delayed.
width = 1280
height = 720

# Background clear colour (sRGB 0–255).
clear_color = [15, 20, 24]

# V-sync / swap-chain present mode.
#   fifo-relaxed  (default) no tearing in the common case.  Presents
#                 immediately (one torn frame) on a missed deadline instead
#                 of waiting for the next vblank, so simulation jitter,
#                 asset loads, or heavy ECS ticks don't cause frame-doubling
#                 stutter.  Falls back to fifo if the backend doesn't
#                 support it.
#   off           non-blocking present — may tear but never stalls.  Use if
#                 you see SurfaceError::Timeout on an integrated GPU under
#                 heavy memory load.
#   auto          let the driver/OS pick the best available strategy.
#   fifo          strict vsync — no tearing, but waits for the next vblank on
#                 a late frame (can stutter during heavy sim or decode load).
#   mailbox       triple-buffer vsync — lower latency than fifo; not universal.
vsync = "fifo-relaxed"

# ─── Content sources ────────────────────────────────────────────────────────
#
# Each [[sources]] entry adds one content root to the lab.
# Fields:
#   name          — human-readable label shown in the UI
#   path          — absolute filesystem path (forward slashes work on Windows)
#   kind          — "steam", "gog", "ea-app", "openra", "manual"
#   rights        — "owned-proprietary", "open-content", "local-custom"
#   shape         — "directory" (default) or "single-file"
#
# Environment variables in `path` are expanded at load time:
#   "${IC_RA1_DISC_ROOT}" resolves to the value of IC_RA1_DISC_ROOT.
#
# No sources are configured by default. Add your own in iron-curtain.toml.
# Examples:
#
# [[sources]]
# name = "RA1 Allied Disc"
# path = "/path/to/your/CD1_ALLIED_DISC"
# kind = "manual"
# rights = "owned-proprietary"
# shape = "directory"
#
# [[sources]]
# name = "C&C Remastered Collection"
# path = "C:/Program Files (x86)/Steam/steamapps/common/CnCRemastered"
# kind = "steam"
# rights = "owned-proprietary"
# shape = "directory"

# ─── Graphics / rendering profile ───────────────────────────────────────────
#
# Controls which frontend is launched and which visual effect buckets are
# enabled.  CLI flags --graphics, --gpu, and --effects override these values.
#
# profile — "auto" | "classic" | "balanced" | "enhanced" | "studio"
#   auto     resolve from hardware, user settings, and content requirements
#   classic  no GPU renderer — CPU-only browser (NOT YET IMPLEMENTED; falls
#            back to modern frontend with a warning during Phase 1)
#   balanced modern GPU frontend, minimal effects and power draw
#   enhanced modern GPU frontend, richer CRT/palette effects
#   studio   enhanced + authoring, diagnostics, and developer-only features
#
# gpu — "auto" | "off" | "on" | "require"
#   auto     resolve automatically
#   off      force classic (non-GPU) frontend
#   on       prefer modern GPU frontend
#   require  abort startup if GPU frontend cannot initialise
#
# fallback — "classic" | "fail"
#   classic  fall back to classic frontend if chosen path is unavailable
#   fail     abort with a clear message instead of falling back
#
# effects — list of visual effect buckets to enable
#   e.g. ["scanlines", "crt-mask", "postfx"]

[graphics]
profile = "auto"
gpu = "auto"
fallback = "classic"
effects = ["scanlines"]

# ─── Performance ────────────────────────────────────────────────────────────

[performance]
# Load entire MIX/MEG archives into RAM at startup for faster browsing.
# Trades memory for speed — good for machines with plenty of RAM.
preload_archives = false

# Maximum rendered frames per second when the window is focused.
# 0 = auto-detect from the display's refresh rate (recommended — avoids
#     rendering more frames than the display can show, saves power).
# Set to a fixed value (e.g. 60) to override.
fps_cap = 0

# Maximum rendered frames per second when the window loses focus.
# 0 = auto-detect from display refresh rate.
# The game loop processes up to 4 simulation ticks per render frame.
# At the Fastest game speed (50 tps) the renderer must run at least
# ceil(50/4) = 13 fps to keep the simulation from falling behind —
# critical in multiplayer lockstep where one player lagging starves
# every other player.  15 fps covers all speed presets with headroom
# while still cutting GPU load ~4× vs 60 fps.
unfocused_fps_cap = 15

# ─── Playback ───────────────────────────────────────────────────────────────

[playback]
# Default animation FPS for sprites and WSA sequences without an explicit rate.
default_animation_fps = 12.0

# Maximum fraction of the window the preview surface can occupy.
# Videos get larger fractions for a cinematic feel.
preview_max_width = 0.72
preview_max_height = 0.72
movie_max_width = 0.96
movie_max_height = 0.96

# Darken every other row to simulate CRT scanlines.
# Replicates the look of the original game on a 240p CRT monitor.
# Set to false to display raw decoded pixels without the effect.
scanlines = true

# Apply Bayer 4×4 ordered dithering when expanding VQA movie frames from
# palette-indexed (6-bit VGA) to RGBA.  Breaks up visible gradient banding
# at colour transitions — the same technique used by ffplay and OpenRA.
# Set to false to display the raw palette colours with no dithering.
vqa_dither = true

# Apply TPDF (triangular probability density function) 1-LSB dither to
# decoded VQA audio.  IMA ADPCM's 4-bit quantisation produces correlated
# noise harmonics; dither whitens the noise floor, removing the faint
# periodic buzz that is audible on headphones.  Magnitude is ±1 LSB —
# inaudible in practice.  Set to false for raw undithered PCM.
audio_dither = true

# Apply a single-pole IIR high-pass filter to decoded VQA audio.  SND1
# audio can carry a low-frequency DC offset; the filter removes it within
# about 1000 samples.  Set to false to skip DC correction.
audio_dc_correction = true

# ─── Audio ──────────────────────────────────────────────────────────────────

[audio]
# Master volume (0.0 = mute, 1.0 = full).
master_volume = 1.0
